services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_prices
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  web:
    image: ghcr.io/padronjosef/nukaloot-web:latest
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3000
    depends_on:
      - api

  api:
    image: ghcr.io/padronjosef/nukaloot-api:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: game_prices
      DB_SSL: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
