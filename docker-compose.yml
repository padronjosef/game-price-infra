services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_prices
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../nukaloot-api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ../nukaloot-api/src:/app/src
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: game_prices
      CORS_ORIGIN: "*"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../nukaloot-web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3003:3003"
    volumes:
      - ../nukaloot-web/src:/app/src
      - ../nukaloot-web/public:/app/public
    environment:
      INTERNAL_API_URL: http://api:3000
      PORT: "3003"
      WATCHPACK_POLLING: "true"
      NEXT_TURBO_POLL_INTERVAL: "1000"
    depends_on:
      - api

volumes:
  pgdata:
